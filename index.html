<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitoring Pekerjaan OSDM</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <svg class="logo" viewBox="0 0 64 64" style="margin:0 auto;display:block;">
      <circle cx="32" cy="32" r="30" fill="#f5b400"/>
      <circle cx="32" cy="32" r="22" fill="#0b2a4a"/>
      <text x="32" y="38" font-size="18" text-anchor="middle" fill="#fff" font-family="Arial">OSDM</text>
    </svg>
    <h1>MONITORING PEKERJAAN OSDM</h1>
    <p>Silakan masuk untuk melanjutkan</p>
    <div class="login-error" id="login-error"></div>
    <form id="login-form">
      <input type="text" id="login-username" placeholder="Username" autocomplete="username" required>
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" required>
      <button type="submit">Masuk</button>
    </form>
  </div>
</div>

<!-- ================= APP SHELL ================= -->
<div id="app-shell" class="app-shell hidden">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <svg width="34" height="34" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="30" fill="#f5b400"/>
        <circle cx="32" cy="32" r="22" fill="#0b2a4a"/>
      </svg>
      <div>MONITORING PEKERJAAN<br>OSDM</div>
    </div>
    <nav id="sidebar-nav"></nav>
    <div class="logout" id="btn-logout">&#10148; Logout</div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button id="btn-burger" class="btn btn-outline btn-sm" style="display:none;">&#9776;</button>
      <div>
        <h2 id="page-title">Dashboard</h2>
        <div class="crumb" id="page-crumb">Dashboard</div>
      </div>
      <div class="user">
        <div style="text-align:right;">
          <div id="topbar-user-name" style="font-weight:600;"></div>
          <div id="topbar-user-role" style="color:var(--muted);font-size:12px;"></div>
        </div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/pages/_base.js"></script>
<script src="js/pages/dashboard.js"></script>
<script src="js/pages/pekerjaan.js"></script>
<script src="js/pages/progress.js"></script>
<script src="js/pages/master.js"></script>
<script src="js/pages/monitoring.js"></script>
<script src="js/pages/laporan.js"></script>
<script src="js/pages/notifikasi.js"></script>
<script src="js/router.js"></script>
<script src="js/app.js"></script>
</body>
</html>
